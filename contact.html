<!--
File: contact.html
Purpose: Collect user input using Bootstrap form components and submit via POST
Testing/Processing: Form submits to Postman Echo and returns JSON of posted fields (Milestone 7)
Author: Venus Martinez
-->

<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact</title>
    <!-- Google Fonts added to website -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Federant&display=swap" rel="stylesheet">

    <!-- Latest Bootstrap 5 CSS -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous" />

    <link rel="stylesheet" href="styles.css" />
</head>

<body class="page-contact">
    <header>
        <h1 class="p-4" data-i18n="contactTitle">Contact Me</h1>
        <!-- Links to other pages of the website -->
        <!-- Bootstrap Navbar: responsive menu system with hamburger toggle on small screens -->
        <nav class="navbar navbar-expand-lg navbar-light bg-light border">
            <div class="container-fluid">
                <a class="navbar-brand" href="index.html">Venus</a>

                <!-- Hamburger button appears on smaller screens -->
                <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#mainNavbar"
                    aria-controls="mainNavbar" aria-expanded="false" aria-label="Toggle navigation">
                    <span class="navbar-toggler-icon"></span>
                </button>

                <div class="collapse navbar-collapse" id="mainNavbar">
                    <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                        <li class="nav-item"><a class="nav-link" href="index.html" data-i18n="navHome">Home</a></li>
                        <li class="nav-item"><a class="nav-link" href="about.html" data-i18n="navAbout">About</a></li>
                        <li class="nav-item"><a class="nav-link" href="hobbies.html" data-i18n="navHobbies">Hobbies</a>
                        </li>
                        <li class="nav-item"><a class="nav-link" href="photos.html" data-i18n="navPhotos">Photos</a>
                        </li>
                        <!-- Contact Page added for Milestone 7 -->
                        <li class="nav-item"><a class="nav-link" href="contact.html" data-i18n="navContact">Contact</a>
                        </li>
                    </ul>

                    <!-- Language selector: used by i18n.js to switch text between English and Spanish -->
                    <div class="d-flex align-items-center gap-2">
                        <label class="form-label mb-0" for="languageSelect">Language or Idioma:</label>
                        <select class="form-select form-select-sm w-auto" id="languageSelect">
                            <option value="en">English</option>
                            <option value="es">Español</option>
                        </select>
                    </div>
                </div>
            </div>
        </nav>

        <hr />
    </header>
    <main>
        <div class="container my-4">
            <div class="card p-4 mx-auto contact-card">
                <!--
                Milestone 7 Requirement:
                    - Bootstrap form controls for data entry
                    - POST form submission to server-side script (Postman Echo)
                    - Each form control includes a name attribute so it appears in the JSON response
            -->
                <form method="POST" action="https://postman-echo.com/post">
                    <div class="row mb-3">
                        <!-- Name field: required text input with Bootstrap form-control styling -->
                        <label for="name" class="col-sm-4 col-form-label">Your Name /<br /> Business Name:</label>
                        <div class="col-sm-8">
                            <input type="text" class="form-control" id="name" name="name" required autocomplete="name">
                        </div>
                    </div>
                    <div class="row mb-3">
                        <!-- Email field: uses type "email" for basic client-side validation -->
                        <label for="email" class="col-sm-4 col-form-label">Your E-mail:</label>
                        <div class="col-sm-8">
                            <input type="email" class="form-control" id="email" name="email" required
                                autocomplete="email">
                        </div>
                    </div>
                    <div class="row mb-3">
                        <!-- Category dropdown: uses Bootstrap form-select for Bootstrap 5 styling -->
                        <label for="reason" class="col-sm-4 col-form-label">Message Category:</label>
                        <div class="col-sm-8">
                            <select class="form-select" id="reason" name="reason" required>
                                <option value="" selected disabled>Select a Category</option>
                                <option value="questions">Questions</option>
                                <option value="comments">Comments</option>
                                <option value="concerns">Concerns</option>
                                <option value="internship">Internship Offer</option>
                                <option value="career">Career Offer</option>
                                <option value="business">Business Opportunity</option>
                                <option value="other">Other</option>
                            </select>
                        </div>
                    </div>
                    <div class="row mb-3">
                        <!-- Message textarea: multi-line input for user message -->
                        <label for="message" class="col-sm-4 col-form-label">Message:</label>
                        <div class="col-sm-8">
                            <textarea class="form-control" id="message" name="message" rows="4" required></textarea>
                        </div>
                    </div>
                    <div class="row mb-3">
                        <div class="col-sm-12">
                            <!-- Submit button: sends form values as POST to Postman Echo for JSON response -->
                            <button type="submit" class="btn btn-primary float-end">Send</button>
                        </div>
                    </div>
                </form>
            </div>
        </div>
        <div class="text-center m-auto p-1">
            <p class="text-muted small mb-0">After clicking Send, the browser will navigate to Postman Echo and display the JSON response containing the form fields.</p>
        </div>
    </main>
    <!-- Footer: consistent with other pages -->
    <footer class="container text-center mt-4 mb-4">
        <hr />
        <small><em>Copyright &copy; 2026 <a class="text-decoration-none text-reset"
                    href="https://github.com/Venus-Martinez">Venus Martinez</a></em></small>
    </footer>
    <script src="https://code.jquery.com/jquery-4.0.0.min.js"></script>


    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
        crossorigin="anonymous"></script>

    <script src="js/i18n.js" defer></script>
    <script src="js/site.js" defer></script>
</body>

</html>
